# Verifies the API Docker image builds (no push — add ECR/GAR login when you wire deploy).
name: Backend Docker build

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-docker.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: moodmap-api:test
